server {
    listen 80;

    # Serve the React build output
    root /usr/share/nginx/html;
    index index.html;

    # React Router — all unknown paths return index.html (SPA routing)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy all /api/* calls to the backend container
    # BACKEND_HOST is injected dynamically at startup via Nginx templates
    location /api/ {
        proxy_pass http://${BACKEND_HOST};
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $proxy_host;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;


        # Important for OAuth redirects — don't buffer large redirect responses
        proxy_buffering off;
    }

    # Gzip compression for faster loads
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    gzip_min_length 1000;
}
